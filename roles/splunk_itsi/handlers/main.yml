---
- name: Restart Splunk after ITSI changes
  ansible.builtin.command:
    cmd: "{{ splunk_bin }} restart"
  become: true
  become_user: "{{ splunk_user }}"
  when: not splunk_enable_systemd | default(true) | bool

- name: Restart Splunkd via systemd after ITSI changes
  ansible.builtin.systemd:
    name: Splunkd
    state: restarted
  when: splunk_enable_systemd | default(true) | bool
